<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ab648"/>
      <stop offset="100%" stop-color="#4a7828"/>
    </linearGradient>
    <linearGradient id="bird" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
  </defs>

  <!-- Rounded rect background -->
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>

  <!-- Branch -->
  <path d="M70 370 Q180 340 300 360 Q380 370 450 355" stroke="#3d2b1f" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M380 358 Q400 330 415 310" stroke="#3d2b1f" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Small leaf on branch -->
  <ellipse cx="420" cy="305" rx="16" ry="8" fill="#7ab648" transform="rotate(-30 420 305)"/>

  <!-- Bird body -->
  <ellipse cx="260" cy="300" rx="65" ry="58" fill="url(#bird)"/>

  <!-- Bird head -->
  <circle cx="310" cy="258" r="48" fill="url(#bird)"/>

  <!-- Eye -->
  <circle cx="328" cy="248" r="9" fill="#1a1a1a"/>
  <circle cx="331" cy="245" r="3.5" fill="#fff"/>

  <!-- Beak -->
  <path d="M355 258 L378 252 L355 264 Z" fill="#e8983e"/>

  <!-- Wing -->
  <path d="M220 290 Q200 270 215 250 Q240 235 270 245 Q250 270 240 295 Z" fill="#d4c8b0"/>

  <!-- Tail feathers -->
  <path d="M200 310 L155 290 L165 315 L145 310 L160 330 L190 320 Z" fill="#c8b898"/>

  <!-- Small feet -->
  <line x1="245" y1="352" x2="238" y2="375" stroke="#e8983e" stroke-width="5" stroke-linecap="round"/>
  <line x1="270" y1="355" x2="265" y2="378" stroke="#e8983e" stroke-width="5" stroke-linecap="round"/>

  <!-- Belly highlight -->
  <ellipse cx="270" cy="315" rx="30" ry="22" fill="#faf8f2" opacity="0.5"/>

  <!-- Cheek blush -->
  <circle cx="300" cy="265" r="10" fill="#f0b0a0" opacity="0.5"/>
</svg>
